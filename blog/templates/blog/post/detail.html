{% extends "blog/base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    <h1>{{ post.title }}</h1>
    <p class="date">Created at: {{ post.created_at }}</p>
    <div>
        {{ post.body|linebreaks }}
    </div>
    <p><a href="{% url 'blog:post_share' post.id %}">Share this post</a></p>
{% endblock %}
